<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#F8F6F3;

font-family:"Inter", sans-serif;

display:flex;
justify-content:center;
align-items:center;

min-height:100vh;

padding:25px;

color:#2F2B2B;

overflow-x:hidden;

}


body::before{

content:"";

position:fixed;

top:0;
left:0;
right:0;
bottom:0;

background:

radial-gradient(circle at top left,#E8DDE9 0%,transparent 35%),

radial-gradient(circle at bottom right,#E8DDE9 0%,transparent 35%);

opacity:.65;

z-index:-1;

}



.card{

width:100%;

max-width:700px;

background:white;

padding:55px;

border-radius:22px;

box-shadow:0 25px 60px rgba(0,0,0,.08);

text-align:center;

animation:fade 1s ease;

}



/* Kim & Cody */

.script{
font-family:"Italianno", cursive;
font-size:75px;
color:#8C6B7E;
line-height:1;
}


.script span{

font-size:50px;

}



/* Find Your Seat */

.title{

font-family:"Cormorant Garamond", serif;

font-size:48px;

font-weight:600;

letter-spacing:2px;

margin-bottom:10px;

}



.subtitle{

color:#777;

line-height:1.7;

margin-bottom:35px;

}



input{

width:100%;

padding:18px;

border-radius:12px;

border:1px solid #ddd;

font-size:18px;

outline:none;

transition:.25s;

}



input:focus{

border-color:#8C6B7E;

box-shadow:0 0 0 4px rgba(140,107,126,.12);

}



.result{

display:none;

margin-top:35px;

padding-top:30px;

border-top:1px solid #eee;

}


.result.show{

animation:seatReveal .6s ease;

}



@keyframes seatReveal{

from{

opacity:0;

transform:translateY(20px) scale(.97);

}

to{

opacity:1;

transform:translateY(0) scale(1);

}

}



.welcome{

font-size:22px;

margin-bottom:10px;

}



.table{

font-family:"Bodoni Moda", serif;

font-size:72px;

font-weight:500;

letter-spacing:3px;

color:#8C6B7E;

margin:15px 0;

}



.with{

margin-top:25px;

margin-bottom:15px;

font-weight:500;

}



ul{

list-style:none;

padding:0;

}



li{

padding:7px;

}



li:hover{

color:#8C6B7E;

}
    #backButton{

margin-top:25px;

padding:12px 25px;

border:none;

border-radius:30px;

background:#8C6B7E;

color:white;

font-family:"Inter", sans-serif;

font-size:15px;

cursor:pointer;

transition:.3s;

}


#backButton:hover{

transform:translateY(-2px);

opacity:.85;

}



.notfound{

display:none;

margin-top:30px;

color:#a94442;

line-height:1.6;

}



.footer{

margin-top:40px;

font-size:14px;

color:#999;

}



@keyframes fade{

from{

opacity:0;

transform:translateY(15px);

}

to{

opacity:1;

transform:none;

}

}



@media(max-width:600px){

.card{

padding:35px 25px;

}


.script{

font-size:55px;

}


.title{

font-size:36px;

}


.table{

font-size:42px;

}

}

</style>

const search = document.getElementById("search");

const result = document.getElementById("result");

const notfound = document.getElementById("notfound");

const guestName = document.getElementById("guestName");

const guestTable = document.getElementById("guestTable");

const tableGuests = document.getElementById("tableGuests");
const backButton = document.getElementById("backButton");



search.addEventListener("input", () => {


const value = search.value.toLowerCase().trim();


result.style.display = "none";

notfound.style.display = "none";



if(value === ""){

return;

}



const matches = guests.filter(g =>

g.name.toLowerCase().includes(value)

);



if(matches.length === 0){

notfound.style.display = "block";

return;

}



if(matches.length > 1){


guestName.textContent = "We found multiple guests:";

guestTable.textContent = "";

tableGuests.innerHTML = "";



matches.forEach(person => {


const li = document.createElement("li");


li.innerHTML = `• ${person.name}`;


li.style.cursor = "pointer";


li.onclick = () => showGuest(person);



tableGuests.appendChild(li);



});



result.style.display = "block";  

result.classList.remove("show");  
    
void result.offsetWidth; 

result.classList.add("show");


return;

}

function showGuest(guest){


guestName.textContent = `Welcome, ${guest.name}!`;


guestTable.textContent = `TABLE ${guest.table}`;


tableGuests.innerHTML = "";



guests

.filter(g => g.table === guest.table)

.sort((a,b)=>a.name.localeCompare(b.name))

.forEach(person => {


const li = document.createElement("li");



if(person.name === guest.name){

li.innerHTML = ` <strong>${person.name}</strong>`;

}

else{

li.innerHTML = ` ${person.name}`;

}



tableGuests.appendChild(li);



});



result.style.display = "block";  

result.classList.remove("show");
