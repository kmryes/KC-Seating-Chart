body{

    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:#333;
    padding:20px;
}

.card{
    background:white;
    max-width:500px;
    width:100%;
    padding:50px 40px;
    border-radius:18px;
    box-shadow:0 15px 40px rgba(0,0,0,.08);
    text-align:center;
}

h1{
    font-family:'Cormorant Garamond',serif;
    font-size:3rem;
    margin-bottom:10px;
}

.subtitle{
    color:#777;
    margin-bottom:35px;
    line-height:1.5;
}

input{
    width:100%;
    padding:16px;
    border-radius:12px;
    border:1px solid #ddd;
    font-size:16px;
    outline:none;
    transition:.2s;
}

input:focus{
    border-color:#8C6B7E;
}

.result{
    margin-top:30px;
    display:none;
}

.name{
    font-size:24px;
    font-weight:600;
}

.table{
    font-size:42px;
    font-family:'Cormorant Garamond',serif;
    color:#8C6B7E;
    margin-top:10px;
}

.notfound{
    color:#c0392b;
    margin-top:25px;
    display:none;
}
</style>
</head>

</p>
